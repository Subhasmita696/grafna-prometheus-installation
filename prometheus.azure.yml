# Prometheus configuration for Azure (Azure Monitor Managed Prometheus)
global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

remote_write:
  - url: https://<region>.monitor.azure.com/<workspace-id>/api/v1/prometheusRemoteWrite
    bearer_token: <Azure AD token>
